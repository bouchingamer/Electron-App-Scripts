<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Electron App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #202124;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      padding: 30px;
      border-radius: 10px;
      background: #2d2f33;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h1 {
      margin-top: 0;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Welcome to Electron!</h1>
    <p>Your app is running successfully.</p>

    <button onclick="sayHello()">Click Me</button>
  </div>

  <script>
    function sayHello() {
      alert("Hello from Electron!");
    }
  </script>
</body>
</html>
